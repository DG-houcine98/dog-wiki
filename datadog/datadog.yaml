kind: "DatadogAgent"
apiVersion: "datadoghq.com/v2alpha1"
metadata:
  name: "datadog"
  namespace: datadog
spec:
  global:
    clusterName: "lahoucine-cluster"
    site: "datadoghq.com"
    tags:
      - "team:pre-sales-engineering"
      - "creator:lahoucine.elhaouri"
    credentials:
      apiSecret:
        secretName: "datadog-secret"
        keyName: "api-key"
    # --- CHOOSE ONE OF THE THREE ROUTING OPTIONS BELOW ---
    #
    # OPTION 1 (active): Logs → Observability Pipelines Worker → CloudPrem
    #   Agent sends logs to OPW, which then forwards them to CloudPrem.
    #   Use this when you want OPW to handle transformation/routing.
    kubelet:
      tlsVerify: false
    env:
      - name: DD_OBSERVABILITY_PIPELINES_WORKER_LOGS_ENABLED
        value: "true"
      - name: DD_OBSERVABILITY_PIPELINES_WORKER_LOGS_URL
        value: "http://opw-observability-pipelines-worker.datadog.svc.cluster.local:8282"
      - name: DD_REMOTE_CONFIGURATION_REFRESH_INTERVAL
        value: "5s"
      - name: DD_SBOM_CONTAINER_IMAGE_ALLOW_MISSING_REPODIGEST
        value: "true"
      - name: DD_RUNTIME_SECURITY_CONFIG_HASH_RESOLVER_REPLACE
        value: >-
          {
            "/app/malware.x64": "sha256:f3f7eb972a998047edb4c6e4287308236fcd8a9ef81dc13e6469590275af3cac",
            "/app/malware.arm64": "sha256:80bab7f4bc97e36724433f9ab2dffea7fc0bf0d0fd31a7b6a4012a4f0821737e"
          }
    #
    # OPTION 2: Logs → CloudPrem directly (bypass OPW)
    #   Agent sends logs straight to the CloudPrem indexer.
    #   Comment out Option 1 above and uncomment the env block below.
    # env:
    #   - name: DD_LOGS_CONFIG_LOGS_DD_URL
    #     value: "http://cp-cloudprem-indexer.cloudprem.svc.cluster.local:7280"
    #
    # OPTION 3: Logs → Datadog directly (no CloudPrem, no OPW)
    #   Remove the env block entirely. Logs go to the site set above (datadoghq.com).
    # (no env override needed)
  features:
    clusterChecks:
      enabled: true
    orchestratorExplorer:
      enabled: true
    logCollection:
      enabled: true
      containerCollectAll: true
    # Cloud Workload Security — runtime threat detection via eBPF.
    # Adds the security-agent container to the DaemonSet and loads default rules.
    cws:
      enabled: true
      syscallMonitorEnabled: true     # process / syscall rules
      network:
        enabled: true                  # network activity rules (reverse shells, suspicious egress)
    apm:
      enabled: true
      instrumentation:
        enabled: true
        targets:
          - name: "default-target"
            namespaceSelector:
              matchNames:
                - "prod"
            ddTraceVersions:
              python: "4"
              js: "5"
            ddTraceConfigs:
              - name: "DD_DYNAMIC_INSTRUMENTATION_ENABLED"
                value: "true"
          - name: "security-playground-target"
            namespaceSelector:
              matchNames:
                - playground
            podSelector:
              matchLabels:
                app: playground-app
            ddTraceVersions:
              java: "1"
              python: "4"
              js: "5"
              php: "1"
              dotnet: "3"
              ruby: "2"
            ddTraceConfigs:
              - name: "DD_APPSEC_ENABLED"
                value: "true"
              - name: "DD_APPSEC_RASP_ENABLED"
                value: "true"
              - name: "DD_IAST_ENABLED"
                value: "true"
              - name: "DD_APPSEC_SCA_ENABLED"
                value: "true"
              - name: "DD_ENV"
                value: "playground-env"
    admissionController:
      enabled: true
      mutateUnlabelled: true
      cwsInstrumentation:
        enabled: true
        mode: remote_copy
    sbom:
      enabled: true
      containerImage:
        enabled: true
        uncompressedLayersSupport: true
