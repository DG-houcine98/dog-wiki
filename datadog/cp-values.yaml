# Static values for the CloudPrem helm chart.
# Values that depend on the CloudPrem infra stack outputs are overridden via
# `--set` in the GitHub Actions workflow:
#   - aws.accountId
#   - serviceAccount.name        (= ${CloudPremNamespace} from the stack)
#   - serviceAccount.eksRoleName (= IRSARoleName output)
#   - config.default_index_root_uri (built from S3BucketName output)
aws:
  accountId: "369042512949"

environment:
  AWS_REGION: eu-west-2

datadog:
  apiKeyExistingSecret: datadog-secret

serviceAccount:
  create: true
  name: cloudprem
  eksRoleName: lahoucine-cp-role
  extraAnnotations: {}

config:
  default_index_root_uri: s3://lahoucine-cp-bucket-369042512949/indexes/cloudprem

ingress:
  internal:
    enabled: true
    name: cloudprem-internal
    host: cloudprem.lahoucine.internal
    extraAnnotations:
      alb.ingress.kubernetes.io/load-balancer-name: cloudprem-internal

# Sandbox-sized resource requests. Chart defaults are tuned for production
# (every component requests cpu:2, memory:4Gi) which won't fit on t3.medium.
metastore:
  replicaCount: 1
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  extraEnvFrom:
    - secretRef:
        name: cloudprem-metastore-uri

control_plane:
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

janitor:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

indexer:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  startupProbe:
    failureThreshold: 60
    periodSeconds: 5
    timeoutSeconds: 2

searcher:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  # Default startup probe is failureThreshold=12 / periodSeconds=5 → 60s.
  # On small instances the first boot is slower; give it 5 min.
  startupProbe:
    failureThreshold: 60
    periodSeconds: 5
    timeoutSeconds: 2
