apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lahoucine-app-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}, {"HTTP": 80}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-2:369042512949:certificate/cc515515-e3f3-4bc4-bec6-85290b50d779
    alb.ingress.kubernetes.io/inbound-cidrs: 176.130.134.25/32, 91.197.137.154/32, 91.197.136.82/32
spec:
  rules:
    - host: dev.mcse-dogwiki.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lahoucine-app-frontend
                port:
                  number: 80
