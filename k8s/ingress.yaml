apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lahoucine-app-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/inbound-cidrs: 176.130.134.25/32, 91.197.137.154/32, 91.197.136.82/32
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lahoucine-app-frontend
                port:
                  number: 80
