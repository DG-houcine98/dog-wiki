name: Build and Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 369042512949.dkr.ecr.eu-west-2.amazonaws.com
  EKS_CLUSTER: lahoucine-cluster
  BACKEND_IMAGE: lahoucine-flask
  FRONTEND_IMAGE: lahoucine-app-frontend

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app.py'
              - 'requirements.txt'
              - 'Dockerfile'
            frontend:
              - 'frontend/**'

  build-backend:
    name: Build & push backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} -t $ECR_REGISTRY/$BACKEND_IMAGE:latest .
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

  build-frontend:
    name: Build & push frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Stamp version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "{\"version\":\"$VERSION\"}" > frontend/public/version.json

      - name: Build and push
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }} -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest frontend/
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

  deploy-dev:
    name: Deploy to Dev
    needs: [build-backend, build-frontend]
    if: always() && !startsWith(github.ref, 'refs/tags/v') && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Ensure dev namespace
        run: kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests to dev
        run: |
          kubectl apply -f k8s/ -n dev

      - name: Deploy backend
        if: needs.build-backend.result == 'success'
        run: |
          kubectl set image deployment/lahoucine-app \
            lahoucine-app=$ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} -n dev
          kubectl rollout status deployment/lahoucine-app -n dev --timeout=120s

      - name: Deploy frontend
        if: needs.build-frontend.result == 'success'
        run: |
          kubectl set image deployment/lahoucine-app-frontend \
            lahoucine-app-frontend=$ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }} -n dev
          kubectl rollout status deployment/lahoucine-app-frontend -n dev --timeout=120s

  deploy-prod:
    name: Deploy to Prod
    needs: [build-backend, build-frontend]
    if: always() && startsWith(github.ref, 'refs/tags/v') && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Ensure prod namespace
        run: kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests to prod
        run: |
          kubectl apply -f k8s/ -n prod

      - name: Deploy backend
        if: needs.build-backend.result == 'success'
        run: |
          kubectl set image deployment/lahoucine-app \
            lahoucine-app=$ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} -n prod
          kubectl rollout status deployment/lahoucine-app -n prod --timeout=120s

      - name: Deploy frontend
        if: needs.build-frontend.result == 'success'
        run: |
          kubectl set image deployment/lahoucine-app-frontend \
            lahoucine-app-frontend=$ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }} -n prod
          kubectl rollout status deployment/lahoucine-app-frontend -n prod --timeout=120s

  release:
    name: Create GitHub Release
    needs: deploy-prod
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images
            - Backend: `369042512949.dkr.ecr.eu-west-2.amazonaws.com/lahoucine-flask:${{ github.sha }}`
            - Frontend: `369042512949.dkr.ecr.eu-west-2.amazonaws.com/lahoucine-app-frontend:${{ github.sha }}`
